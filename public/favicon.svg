<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Dash">
  <!-- Light palette is set via presentation attributes (always renders); dark
       mode flips it. Index card + 3 punch-holes + the accent em-dash = "Dash". -->
  <style>
    @media (prefers-color-scheme: dark) {
      .bg     { fill: #14110F }
      .card   { fill: #1E1A15 }
      .ink    { fill: #EDE3D4 }
      .stroke { stroke: #EDE3D4 }
      .acc    { fill: #F0532E }
    }
  </style>
  <rect class="bg" width="64" height="64" fill="#F2EDE3"/>
  <rect class="card stroke" x="11" y="13" width="42" height="38" fill="#F8F2E7" stroke="#1A1714" stroke-width="2.5"/>
  <circle class="ink" cx="24" cy="22" r="2.4" fill="#1A1714"/>
  <circle class="ink" cx="32" cy="22" r="2.4" fill="#1A1714"/>
  <circle class="ink" cx="40" cy="22" r="2.4" fill="#1A1714"/>
  <rect class="acc" x="20" y="30" width="24" height="7" fill="#DD3B1E"/>
  <rect class="ink" x="20" y="44" width="16" height="1.6" fill="#1A1714" opacity="0.5"/>
</svg>
